<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Очистка кэша ORDINA</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
        }
        .btn-secondary:hover {
            background: #e5e7eb;
        }
        .status {
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }
        .status.success {
            background: #d1fae5;
            color: #065f46;
            display: block;
        }
        .status.error {
            background: #fee2e2;
            color: #991b1b;
            display: block;
        }
        .status.info {
            background: #dbeafe;
            color: #1e40af;
            display: block;
        }
        .icon {
            font-size: 48px;
            text-align: center;
            margin-bottom: 20px;
        }
        .steps {
            background: #f9fafb;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
        .steps ol {
            margin: 0;
            padding-left: 20px;
        }
        .steps li {
            margin: 10px 0;
            color: #374151;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🧹</div>
        <h1>Очистка кэша ORDINA</h1>
        <p class="subtitle">Исправление ошибок hesab.az и других</p>
        
        <div id="status" class="status"></div>
        
        <button class="btn-primary" onclick="clearAll()">
            🗑️ Очистить всё (рекомендуется)
        </button>
        
        <button class="btn-secondary" onclick="clearCaches()">
            📦 Очистить только кэши
        </button>
        
        <button class="btn-secondary" onclick="unregisterSW()">
            ⚙️ Удалить Service Workers
        </button>
        
        <button class="btn-secondary" onclick="clearStorage()">
            💾 Очистить localStorage
        </button>
        
        <div class="steps">
            <strong>После очистки:</strong>
            <ol>
                <li>Закройте все вкладки с ORDINA</li>
                <li>Закройте браузер полностью</li>
                <li>Откройте браузер снова</li>
                <li>Откройте ORDINA</li>
                <li>Проверьте консоль (F12)</li>
            </ol>
        </div>
        
        <button class="btn-primary" onclick="goToApp()">
            ✅ Перейти к приложению
        </button>
    </div>

    <script>
        function showStatus(message, type = 'info') {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status ${type}`;
            setTimeout(() => {
                status.style.display = 'none';
            }, 5000);
        }

        async function clearCaches() {
            try {
                const keys = await caches.keys();
                await Promise.all(keys.map(key => caches.delete(key)));
                showStatus(`✅ Очищено ${keys.length} кэшей`, 'success');
                console.log('Caches cleared:', keys);
            } catch (error) {
                showStatus('❌ Ошибка очистки кэшей: ' + error.message, 'error');
                console.error('Cache clear error:', error);
            }
        }

        async function unregisterSW() {
            try {
                const registrations = await navigator.serviceWorker.getRegistrations();
                await Promise.all(registrations.map(reg => reg.unregister()));
                showStatus(`✅ Удалено ${registrations.length} Service Workers`, 'success');
                console.log('Service Workers unregistered:', registrations);
            } catch (error) {
                showStatus('❌ Ошибка удаления SW: ' + error.message, 'error');
                console.error('SW unregister error:', error);
            }
        }

        function clearStorage() {
            try {
                localStorage.clear();
                sessionStorage.clear();
                showStatus('✅ localStorage и sessionStorage очищены', 'success');
                console.log('Storage cleared');
            } catch (error) {
                showStatus('❌ Ошибка очистки storage: ' + error.message, 'error');
                console.error('Storage clear error:', error);
            }
        }

        async function clearAll() {
            showStatus('🔄 Очистка всего...', 'info');
            
            try {
                await clearCaches();
                await unregisterSW();
                clearStorage();
                
                showStatus('✅ Всё очищено! Закройте браузер и откройте снова.', 'success');
                
                // Перезагрузка через 3 секунды
                setTimeout(() => {
                    window.location.reload(true);
                }, 3000);
            } catch (error) {
                showStatus('❌ Ошибка: ' + error.message, 'error');
                console.error('Clear all error:', error);
            }
        }

        function goToApp() {
            window.location.href = './index.html';
        }

        // Показываем информацию при загрузке
        window.addEventListener('load', () => {
            showStatus('ℹ️ Нажмите "Очистить всё" для исправления ошибок', 'info');
        });
    </script>
</body>
</html>
