<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORDINA - Диагностика</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: #f3f4f6;
        }
        .container {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #3b82f6;
            margin-bottom: 10px;
        }
        .status {
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 4px solid;
        }
        .status.success {
            background: #d1fae5;
            border-color: #10b981;
            color: #065f46;
        }
        .status.error {
            background: #fee2e2;
            border-color: #ef4444;
            color: #991b1b;
        }
        .status.warning {
            background: #fef3c7;
            border-color: #f59e0b;
            color: #92400e;
        }
        .status.info {
            background: #dbeafe;
            border-color: #3b82f6;
            color: #1e40af;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 5px;
        }
        button:hover {
            background: #2563eb;
        }
        .code {
            background: #1f2937;
            color: #f3f4f6;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin: 10px 0;
        }
        .section {
            margin: 20px 0;
            padding: 15px;
            background: #f9fafb;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 ORDINA - Диагностика</h1>
        <p>Проверка работоспособности всех функций</p>
        
        <button onclick="runDiagnostics()">▶️ Запустить диагностику</button>
        <button onclick="clearAllCache()">🗑️ Очистить весь кэш</button>
        <button onclick="location.href='./index.html'">🏠 Вернуться к приложению</button>
        
        <div id="results"></div>
    </div>

    <script>
        async function runDiagnostics() {
            const results = document.getElementById('results');
            results.innerHTML = '<h2>Результаты диагностики:</h2>';
            
            // 1. Проверка браузера
            addResult('Браузер', navigator.userAgent, 'info');
            
            // 2. Проверка протокола
            const protocol = window.location.protocol;
            addResult('Протокол', protocol, protocol === 'https:' ? 'success' : 'warning');
            
            // 3. Проверка Service Worker
            if ('serviceWorker' in navigator) {
                try {
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    addResult('Service Worker', `Найдено: ${registrations.length}`, registrations.length > 0 ? 'success' : 'warning');
                } catch (e) {
                    addResult('Service Worker', 'Ошибка: ' + e.message, 'error');
                }
            } else {
                addResult('Service Worker', 'Не поддерживается', 'warning');
            }
            
            // 4. Проверка кэшей
            try {
                const cacheNames = await caches.keys();
                addResult('Кэши', `Найдено: ${cacheNames.length}`, 'info');
                if (cacheNames.length > 0) {
                    addResult('Список кэшей', cacheNames.join(', '), 'info');
                }
            } catch (e) {
                addResult('Кэши', 'Ошибка: ' + e.message, 'error');
            }
            
            // 5. Проверка localStorage
            try {
                const keys = Object.keys(localStorage);
                addResult('localStorage', `Ключей: ${keys.length}`, 'info');
            } catch (e) {
                addResult('localStorage', 'Ошибка: ' + e.message, 'error');
            }
            
            // 6. Проверка доступности файлов
            const files = ['./index.html', './manifest.json', './sw.js'];
            for (const file of files) {
                try {
                    const response = await fetch(file, { method: 'HEAD' });
                    addResult(`Файл: ${file}`, `Статус: ${response.status}`, response.ok ? 'success' : 'error');
                } catch (e) {
                    addResult(`Файл: ${file}`, 'Недоступен: ' + e.message, 'error');
                }
            }
            
            // 7. Проверка консоли
            addResult('Консоль', 'Откройте F12 для просмотра ошибок', 'info');
            
            // 8. Рекомендации
            const section = document.createElement('div');
            section.className = 'section';
            section.innerHTML = `
                <h3>📝 Рекомендации:</h3>
                <ul>
                    <li>Если Service Worker = 0, обновите страницу (Ctrl+F5)</li>
                    <li>Если много кэшей, нажмите "Очистить весь кэш"</li>
                    <li>Если файлы недоступны, проверьте деплой на GitHub</li>
                    <li>Откройте консоль (F12) для детальных ошибок</li>
                </ul>
            `;
            results.appendChild(section);
        }
        
        function addResult(title, message, type) {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `status ${type}`;
            div.innerHTML = `<strong>${title}:</strong> ${message}`;
            results.appendChild(div);
        }
        
        async function clearAllCache() {
            if (!confirm('Очистить весь кэш? Это удалит все сохраненные данные.')) {
                return;
            }
            
            const results = document.getElementById('results');
            results.innerHTML = '<h2>Очистка кэша...</h2>';
            
            try {
                // Очистка кэшей
                const cacheNames = await caches.keys();
                await Promise.all(cacheNames.map(name => caches.delete(name)));
                addResult('Кэши', `Удалено: ${cacheNames.length}`, 'success');
                
                // Удаление Service Workers
                const registrations = await navigator.serviceWorker.getRegistrations();
                await Promise.all(registrations.map(reg => reg.unregister()));
                addResult('Service Workers', `Удалено: ${registrations.length}`, 'success');
                
                // Очистка localStorage
                localStorage.clear();
                sessionStorage.clear();
                addResult('Storage', 'Очищен', 'success');
                
                addResult('Готово', 'Закройте браузер и откройте снова', 'success');
                
                setTimeout(() => {
                    window.location.reload(true);
                }, 3000);
            } catch (e) {
                addResult('Ошибка', e.message, 'error');
            }
        }
        
        // Автозапуск при загрузке
        window.addEventListener('load', () => {
            runDiagnostics();
        });
    </script>
</body>
</html>
